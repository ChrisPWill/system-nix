name: Installer ISO

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Force a build even if no new commits have landed since the last run
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: installer-iso
  cancel-in-progress: false

jobs:
  should-build:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check whether a new build is needed
        id: check
        uses: actions/github-script@v7
        env:
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
        with:
          script: |
            const force = process.env.FORCE_BUILD === 'true';
            const currentSha = context.sha;

            if (force) {
              core.setOutput('build', 'true');
              core.setOutput('reason', 'Manual dispatch forced a rebuild.');
              core.summary.addHeading('Installer ISO decision').addRaw('Build scheduled: manual override.').write();
              return;
            }

            const { owner, repo } = context.repo;
            const workflowId = 'installer-iso.yml';
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
              status: 'completed',
            });

            const previousRun = runs.find((run) => run.id !== context.runId);
            if (!previousRun) {
              core.setOutput('build', 'true');
              core.setOutput('reason', 'No prior installer ISO workflow run exists.');
              core.summary.addHeading('Installer ISO decision').addRaw('Build scheduled: first run.').write();
              return;
            }

            const shouldBuild = previousRun.head_sha !== currentSha;
            const reason = shouldBuild
              ? `Current HEAD ${currentSha} differs from the last completed installer ISO run at ${previousRun.head_sha}.`
              : `Skipping build because the last completed installer ISO run already built HEAD ${currentSha}.`;

            core.setOutput('build', shouldBuild ? 'true' : 'false');
            core.setOutput('reason', reason);
            core.summary.addHeading('Installer ISO decision').addRaw(reason).write();

  build:
    runs-on: ubuntu-latest
    needs: should-build
    if: needs.should-build.outputs.build == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build installer ISO
        run: |
          set -o pipefail
          nix build -L .#nixosConfigurations.installer.config.system.build.isoImage --out-link result-iso 2>&1 | tee installer-iso-build.log

      - name: Locate installer ISO
        id: iso
        run: |
          iso_path="$(readlink -f result-iso/iso/*.iso)"
          echo "iso_path=$iso_path" >> "$GITHUB_OUTPUT"
          echo "iso_name=$(basename "$iso_path")" >> "$GITHUB_OUTPUT"

      - name: Upload installer ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso-${{ github.sha }}
          path: ${{ steps.iso.outputs.iso_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload installer build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-iso-build-log-${{ github.sha }}
          path: installer-iso-build.log
          if-no-files-found: ignore

  skip:
    runs-on: ubuntu-latest
    needs: should-build
    if: needs.should-build.outputs.build != 'true'
    steps:
      - name: Report skipped build
        run: echo "${{ needs.should-build.outputs.reason }}"
