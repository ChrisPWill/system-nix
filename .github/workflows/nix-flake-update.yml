name: Nix flake update

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nix-flake-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment: master
    env:
      UPDATE_BRANCH: automation/nix-flake-update
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Create log directory
        run: mkdir -p "$RUNNER_TEMP/nix-flake-update-logs"

      - name: Update flake inputs
        id: update
        continue-on-error: true
        run: |
          set -o pipefail
          nix flake update 2>&1 | tee "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-update.log"

      - name: Check updated flake
        id: check
        if: steps.update.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          nix flake check -L 2>&1 | tee "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-check.log"

      - name: Require OpenAI API key for Codex repair
        if: steps.update.outcome == 'failure' || steps.check.outcome == 'failure'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required when the flake update or check fails." >&2
            exit 1
          fi

      - name: Write Codex repair prompt
        id: repair_prompt
        if: steps.update.outcome == 'failure' || steps.check.outcome == 'failure'
        run: |
          prompt_file=".codex-nix-flake-update-prompt.md"

          {
            printf '%s\n' "You are maintaining the Nix flake in ${{ github.repository }}."
            printf '\n'
            printf '%s\n' "A scheduled \`nix flake update\` automation failed, or the updated flake failed validation."
            printf '%s\n' "Read AGENTS.md first. Then use the logs included below."
            printf '\n'
            printf '%s\n' "Make the smallest appropriate changes so that:"
            printf '%s\n' "- \`nix flake update\` succeeds"
            printf '%s\n' "- \`nix flake check -L\` succeeds on the GitHub Actions x86_64-linux runner"
            printf '\n'
            printf '%s\n' "Keep the update focused on flake input updates and compatibility fixes caused by those updates."
            printf '%s\n' "Do not refactor unrelated code or change user-facing configuration unless required by the update."
            printf '%s\n' "If updated nixpkgs marks a package insecure or end-of-life, prefer updating or removing the stale package/output that caused evaluation to fail."
            printf '%s\n' "Do not paper over update failures with NIXPKGS_ALLOW_INSECURE or broad permittedInsecurePackages exceptions unless the repo already documents that exact exception as intentional."
            printf '%s\n' "Leave a concise summary of what you changed."
            printf '\n'

            for log in \
              "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-update.log" \
              "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-check.log"
            do
              if [ -f "$log" ]; then
                printf '## %s\n\n' "$(basename "$log")"
                printf '```text\n'
                tail -c 60000 "$log"
                printf '\n```\n\n'
              fi
            done
          } > "$prompt_file"

          echo "prompt_file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Repair failed update with Codex
        if: steps.update.outcome == 'failure' || steps.check.outcome == 'failure'
        uses: openai/codex-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt-file: ${{ steps.repair_prompt.outputs.prompt_file }}

      - name: Verify Codex repair
        if: steps.update.outcome == 'failure' || steps.check.outcome == 'failure'
        run: |
          set -o pipefail
          nix flake update 2>&1 | tee "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-update-after-codex.log"
          nix flake check -L 2>&1 | tee "$RUNNER_TEMP/nix-flake-update-logs/nix-flake-check-after-codex.log"

      - name: Remove generated Codex prompt
        if: always()
        run: rm -f .codex-nix-flake-update-prompt.md

      - name: Describe update path
        id: path
        if: always()
        run: |
          if [ "${{ steps.update.outcome }}" = "success" ] && [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "mode=lockfile-only" >> "$GITHUB_OUTPUT"
            echo "summary=Automated nix flake update passed without Codex repair." >> "$GITHUB_OUTPUT"
          else
            echo "mode=codex-assisted" >> "$GITHUB_OUTPUT"
            echo "summary=Codex repaired the failed nix flake update or validation failure." >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ env.UPDATE_BRANCH }}
          base: master
          delete-branch: true
          commit-message: "chore(nix): update flake inputs"
          title: "Update Nix flake inputs"
          body: |
            ## Summary
            - ${{ steps.path.outputs.summary }}
            - Validation: `nix flake check -L`

            ## Run
            - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload Nix logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nix-flake-update-logs
          path: ${{ runner.temp }}/nix-flake-update-logs/*.log
          if-no-files-found: ignore
