name: Neovim LSP

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-neovim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build meow
        run: nix build .#meow --print-out-paths --no-link

  lsp-tests:
    runs-on: ubuntu-latest
    needs: build-neovim
    strategy:
      fail-fast: false
      matrix:
        language: [kotlin, typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run ${{ matrix.language }} LSP check
        run: |
          set -o pipefail
          nix build -L ".#checks.x86_64-linux.neovim-lsp-${{ matrix.language }}" 2>&1 | tee "neovim-lsp-${{ matrix.language }}.log"
      - name: Upload Neovim logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neovim-lsp-${{ matrix.language }}-logs
          path: |
            neovim-lsp-${{ matrix.language }}.log
            result/logs/*
          if-no-files-found: ignore
